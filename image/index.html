<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW 圖片工具</title>
    <meta
      name="description"
      content="Browse image tools including resize, perspective correction, video to GIF, animated background removal, watermark removal, and compress utilities."
    />
    <meta
      name="keywords"
      content="image tools,image resize,image perspective correction,video to gif,gif background remover,image compress,gemini watermark remover"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-category="image">
    <div data-layout="header"></div>
    <main class="layout-shell">
      <section class="hero">
        <h1 id="category-title">圖片工具</h1>
        <p id="category-description">圖片處理工具</p>
      </section>

      <section class="panel">
        <h2 id="category-filter-title">篩選工具</h2>
        <div class="field">
          <label id="category-search-label" for="category-search">依名稱或關鍵字搜尋</label>
          <input id="category-search" type="search" placeholder="例如：尺寸調整、壓縮" />
        </div>
        <div id="category-tool-list" class="tool-grid" aria-live="polite"></div>
      </section>
    </main>
    <div data-layout="footer"></div>

    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.28";
      import initCategoryPage from "/assets/js/category.js?v=1.6.28";

      initLayout();
      initCategoryPage();
    </script>
  </body>
</html>
