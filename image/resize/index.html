<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW 圖片尺寸調整</title>
    <meta name="description" content="Resize images by width and height directly in your browser." />
    <meta name="keywords" content="image resize,photo resize,change image dimensions" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div data-layout="header"></div>
    <main class="layout-shell">
      <article class="tool-page">
        <section class="hero">
          <h1>圖片尺寸調整</h1>
          <p class="lead">上傳圖片後設定尺寸並下載調整結果。</p>
        </section>

        <section class="panel">
          <h2>輸入</h2>
          <div id="resize-drop-zone" class="drop-zone">
            <strong>拖曳圖片到這裡（支援單檔/批量）</strong>
            <p class="hint">或手動選擇一張或多張圖片</p>
            <input id="resize-file" type="file" accept="image/*" multiple />
          </div>
        </section>

        <section class="panel">
          <h2>操作</h2>
          <div class="row">
            <div class="field">
              <label for="resize-width">寬度 (px)</label>
              <input id="resize-width" type="number" min="1" value="800" />
            </div>
            <div class="field">
              <label for="resize-height">高度 (px)</label>
              <input id="resize-height" type="number" min="1" value="600" />
            </div>
          </div>

          <div class="field">
            <label for="resize-keep-ratio">
              <input id="resize-keep-ratio" type="checkbox" checked />
              <span id="resize-keep-ratio-text">固定比例</span>
            </label>
          </div>

          <div class="actions">
            <button id="resize-btn" class="btn btn-primary" type="button">調整尺寸</button>
            <button id="resize-sample-btn" class="btn" type="button">載入範例圖片</button>
            <button id="resize-clear-btn" class="btn btn-danger" type="button">清除</button>
          </div>
        </section>

        <section class="panel">
          <h2>輸出</h2>
          <div class="batch-gallery">
            <section class="gallery-panel">
              <h3 id="resize-input-gallery-title">輸入縮圖</h3>
              <div id="resize-input-gallery" class="thumb-grid"></div>
            </section>
            <section class="gallery-panel">
              <h3 id="resize-output-gallery-title">輸出縮圖</h3>
              <div id="resize-output-gallery" class="thumb-grid"></div>
            </section>
          </div>
          <p id="resize-gallery-hint" class="hint">點擊縮圖可放大檢視。</p>
          <div id="resize-meta" class="kv"></div>
          <div class="actions">
            <button id="resize-download-btn" class="btn" type="button" disabled>下載 PNG / ZIP</button>
          </div>
        </section>

        <section class="panel">
          <h2>使用方式</h2>
          <p>1. 上傳圖片或直接拖曳，可單檔或批量。</p>
          <p>2. 設定寬高後點擊調整尺寸。</p>
          <p>3. 單檔下載為 PNG，批量下載為 ZIP。</p>
        </section>

        <section class="panel">
          <h2>常見問題</h2>
          <p><strong>上傳安全嗎？</strong> 安全，檔案不會離開你的瀏覽器。</p>
          <p><strong>可以固定比例嗎？</strong> 調整寬高前先勾選固定比例。</p>
        </section>

        <section class="panel">
          <h2>推薦工具</h2>
          <ul class="link-list" data-layout="recommended"></ul>
        </section>
      </article>
    </main>
    <div data-layout="footer"></div>

    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.26";
      import initImageResize from "/assets/js/tools/image_resize.js?v=1.6.26";

      initLayout();
      initImageResize();
    </script>
  </body>
</html>
