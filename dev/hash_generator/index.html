<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW 雜湊產生器</title>
    <meta name="description" content="Generate MD5, SHA1, and SHA256 雜湊值es from text in your browser." />
    <meta name="keywords" content="md5 generator,sha1 generator,sha256 generator,hash tool" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div data-layout="header"></div>
    <main class="layout-shell">
      <article class="tool-page">
        <section class="hero">
          <h1>雜湊產生器</h1>
          <p class="lead">快速產生 MD5、SHA1、SHA256 雜湊結果。</p>
        </section>

        <section class="panel">
          <h2>輸入</h2>
          <div class="field">
            <label for="hash-input">原始文字</label>
            <textarea id="hash-input" placeholder="請輸入要雜湊的文字..."></textarea>
          </div>
        </section>

        <section class="panel">
          <h2>操作</h2>
          <div class="actions">
            <button id="generate-btn" class="btn btn-primary" type="button">產生雜湊</button>
            <button id="sample-btn" class="btn" type="button">載入範例</button>
            <button id="clear-btn" class="btn btn-danger" type="button">清除</button>
          </div>
        </section>

        <section class="panel">
          <h2>輸出</h2>
          <div class="field">
            <label for="md5-output">MD5</label>
            <input id="md5-output" type="text" readonly placeholder="MD5 雜湊值" />
          </div>
          <div class="actions">
            <button id="copy-md5" class="btn" type="button">複製 MD5</button>
          </div>

          <div class="field">
            <label for="sha1-output">SHA1</label>
            <input id="sha1-output" type="text" readonly placeholder="SHA1 雜湊值" />
          </div>
          <div class="actions">
            <button id="copy-sha1" class="btn" type="button">複製 SHA1</button>
          </div>

          <div class="field">
            <label for="sha256-output">SHA256</label>
            <input id="sha256-output" type="text" readonly placeholder="SHA256 雜湊值" />
          </div>
          <div class="actions">
            <button id="copy-sha256" class="btn" type="button">複製 SHA256</button>
          </div>
        </section>

        <section class="panel">
          <h2>使用方式</h2>
          <p>1. 輸入原始文字。</p>
          <p>2. 點擊產生雜湊。</p>
          <p>3. 複製需要的雜湊值。</p>
        </section>

        <section class="panel">
          <h2>常見問題</h2>
          <p><strong>資料會送到伺服器嗎？</strong> 不會，所有雜湊都在瀏覽器本機完成。</p>
          <p><strong>雜湊可以反推嗎？</strong> 不行，雜湊設計上是單向運算。</p>
        </section>

        <section class="panel">
          <h2>推薦工具</h2>
          <ul class="link-list" data-layout="recommended"></ul>
        </section>
      </article>
    </main>
    <div data-layout="footer"></div>

    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.26";
      import initHashGenerator from "/assets/js/tools/hash_generator.js?v=1.6.26";

      initLayout();
      initHashGenerator();
    </script>
  </body>
</html>
