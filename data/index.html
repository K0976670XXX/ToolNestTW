<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW 資料工具</title>
    <meta
      name="description"
      content="Browse data tools including JSON formatter, JSON validator, JSON tree viewer, SQL formatter, QR code generator, and SRT range shift."
    />
    <meta
      name="keywords"
      content="data tools,json formatter,json validator,json tree viewer,sql formatter,qr code generator,srt subtitle shift"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-category="data">
    <div data-layout="header"></div>
    <main class="layout-shell">
      <section class="hero">
        <h1 id="category-title">資料工具</h1>
        <p id="category-description">資料處理工具</p>
      </section>

      <section class="panel">
        <h2 id="category-filter-title">篩選工具</h2>
        <div class="field">
          <label id="category-search-label" for="category-search">依名稱或關鍵字搜尋</label>
          <input id="category-search" type="search" placeholder="例如：JSON、QR、驗證" />
        </div>
        <div id="category-tool-list" class="tool-grid" aria-live="polite"></div>
      </section>
    </main>
    <div data-layout="footer"></div>

    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.26";
      import initCategoryPage from "/assets/js/category.js?v=1.6.26";

      initLayout();
      initCategoryPage();
    </script>
  </body>
</html>
