<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW QR Code 產生器</title>
    <meta name="description" content="Generate QR code images from text or URLs instantly in browser." />
    <meta name="keywords" content="qr code generator,qr maker,url qr code" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div data-layout="header"></div>
    <main class="layout-shell">
      <article class="tool-page">
        <section class="hero">
          <h1>QR Code 產生器</h1>
          <p class="lead">將文字、連結或代碼轉成可下載的 QR 圖片。</p>
        </section>

        <section class="panel">
          <h2>輸入</h2>
          <div class="field">
            <label for="qr-input">文字或網址</label>
            <textarea id="qr-input" placeholder="https://example.com/ToolNestTW-tool"></textarea>
          </div>
        </section>

        <section class="panel">
          <h2>操作</h2>
          <div class="row">
            <div class="field">
              <label for="qr-size">圖片尺寸 (px)</label>
              <input id="qr-size" type="number" min="128" max="1024" step="16" value="320" />
            </div>
            <div class="field">
              <label for="qr-level">容錯等級</label>
              <select id="qr-level">
                <option value="L">L (7%)</option>
                <option value="M" selected>M (15%)</option>
                <option value="Q">Q (25%)</option>
                <option value="H">H (30%)</option>
              </select>
            </div>
          </div>
          <div class="actions">
            <button id="qr-generate-btn" class="btn btn-primary" type="button">產生 QR</button>
            <button id="qr-sample-btn" class="btn" type="button">載入範例</button>
            <button id="qr-clear-btn" class="btn btn-danger" type="button">清除</button>
          </div>
        </section>

        <section class="panel">
          <h2>輸出</h2>
          <div class="preview-box">
            <canvas id="qr-canvas" width="320" height="320" aria-label="QR code preview"></canvas>
          </div>
          <div class="actions">
            <button id="qr-copy-btn" class="btn" type="button">複製資料網址</button>
            <button id="qr-download-btn" class="btn" type="button" disabled>下載 PNG</button>
          </div>
        </section>

        <section class="panel">
          <h2>使用方式</h2>
          <p>1. 輸入文字或 URL。</p>
          <p>2. 選擇尺寸與容錯等級。</p>
          <p>3. 產生並下載 QR 圖片。</p>
        </section>

        <section class="panel">
          <h2>常見問題</h2>
          <p><strong>可以產生長文字嗎？</strong> 可以，但受 QR 容量限制。</p>
          <p><strong>離線可用嗎？</strong> 可以，QR 產生在瀏覽器本機執行。</p>
        </section>

        <section class="panel">
          <h2>推薦工具</h2>
          <ul class="link-list" data-layout="recommended"></ul>
        </section>
      </article>
    </main>
    <div data-layout="footer"></div>

    <script src="/assets/js/vendor/qrcode-generator.js?v=1.6.26"></script>
    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.26";
      import initQrGenerator from "/assets/js/tools/qr_generator.js?v=1.6.26";

      initLayout();
      initQrGenerator();
    </script>
  </body>
</html>
