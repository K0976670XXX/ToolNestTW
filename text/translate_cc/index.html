<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW 繁簡轉換器</title>
    <meta name="description" content="Convert Traditional and Simplified Chinese text locally in your browser." />
    <meta
      name="keywords"
      content="traditional simplified converter,opencc,繁簡轉換,繁體簡體轉換"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div data-layout="header"></div>
    <main class="layout-shell">
      <article class="tool-page">
        <section class="hero">
          <h1>繁簡轉換器</h1>
          <p class="lead">使用 OpenCC 在本機瀏覽器進行繁體與簡體文字轉換。</p>
        </section>

        <section class="panel">
          <h2>輸入</h2>
          <div class="field">
            <label for="cc-input">輸入文字</label>
            <textarea id="cc-input" placeholder="請輸入要轉換的中文內容"></textarea>
          </div>
        </section>

        <section class="panel">
          <h2>操作</h2>
          <div class="field">
            <label for="cc-direction">轉換方向</label>
            <select id="cc-direction">
              <option value="s2t">簡體 → 繁體</option>
              <option value="t2s">繁體 → 簡體</option>
            </select>
          </div>
          <div class="actions">
            <button id="cc-convert-btn" class="btn btn-primary" type="button">開始轉換</button>
            <button id="cc-sample-btn" class="btn" type="button">載入範例</button>
            <button id="cc-clear-btn" class="btn btn-danger" type="button">清除</button>
          </div>
        </section>

        <section class="panel">
          <h2>輸出</h2>
          <div class="field">
            <label for="cc-output">轉換結果</label>
            <textarea id="cc-output" readonly placeholder="結果會顯示在這裡"></textarea>
          </div>
          <div class="actions">
            <button id="cc-copy-btn" class="btn" type="button">複製輸出</button>
          </div>
        </section>

        <section class="panel">
          <h2>使用方式</h2>
          <p>1. 貼上要轉換的中文文字。</p>
          <p>2. 選擇轉換方向並點擊開始轉換。</p>
          <p>3. 複製結果使用。</p>
        </section>

        <section class="panel">
          <h2>常見問題</h2>
          <p><strong>資料會上傳嗎？</strong> 不會，所有轉換都在瀏覽器本機完成。</p>
          <p><strong>轉換引擎是什麼？</strong> 使用 OpenCC 字詞轉換引擎。</p>
        </section>

        <section class="panel">
          <h2>推薦工具</h2>
          <ul class="link-list" data-layout="recommended"></ul>
        </section>
      </article>
    </main>
    <div data-layout="footer"></div>

    <script src="/assets/js/vendor/opencc-full.js?v=1.6.26"></script>
    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.26";
      import initTranslateCc from "/assets/js/tools/translate_cc.js?v=1.6.26";

      initLayout();
      initTranslateCc();
    </script>
  </body>
</html>
