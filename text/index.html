<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW 文字工具</title>
    <meta name="description" content="Browse text tools including diff checker, word counter, slug generator, and language conversion." />
    <meta name="keywords" content="text tools,text diff,word counter,slug generator,language converter" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-category="text">
    <div data-layout="header"></div>
    <main class="layout-shell">
      <section class="hero">
        <h1 id="category-title">文字工具</h1>
        <p id="category-description">文字處理工具</p>
      </section>

      <section class="panel">
        <h2 id="category-filter-title">篩選工具</h2>
        <div class="field">
          <label id="category-search-label" for="category-search">依名稱或關鍵字搜尋</label>
          <input id="category-search" type="search" placeholder="例如：diff、字數、slug" />
        </div>
        <div id="category-tool-list" class="tool-grid" aria-live="polite"></div>
      </section>
    </main>
    <div data-layout="footer"></div>

    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.26";
      import initCategoryPage from "/assets/js/category.js?v=1.6.26";

      initLayout();
      initCategoryPage();
    </script>
  </body>
</html>
