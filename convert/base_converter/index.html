<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW 進制轉換</title>
    <meta name="description" content="Convert numbers between binary, octal, decimal, hexadecimal, and any base 2-36." />
    <meta name="keywords" content="base converter,binary,octal,decimal,hexadecimal,radix converter" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div data-layout="header"></div>
    <main class="layout-shell">
      <article class="tool-page">
        <section class="hero">
          <h1>進制轉換</h1>
          <p class="lead">支援 2 到 36 進制，快速互轉並提供常用進制結果。</p>
        </section>

        <section class="panel">
          <h2>輸入</h2>
          <div class="field">
            <label for="base-input">數值</label>
            <input id="base-input" type="text" placeholder="例如：101101、7f、123456789" />
          </div>
          <div class="row">
            <div class="field">
              <label for="base-from">來源進制</label>
              <input id="base-from" type="number" min="2" max="36" step="1" value="10" />
            </div>
            <div class="field">
              <label for="base-to">目標進制</label>
              <input id="base-to" type="number" min="2" max="36" step="1" value="16" />
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>操作</h2>
          <div class="actions">
            <button id="base-convert-btn" class="btn btn-primary" type="button">轉換</button>
            <button id="base-swap-btn" class="btn" type="button">交換進制</button>
            <button id="base-sample-btn" class="btn" type="button">載入範例</button>
            <button id="base-clear-btn" class="btn btn-danger" type="button">清除</button>
          </div>
        </section>

        <section class="panel">
          <h2>輸出</h2>
          <div class="field">
            <label for="base-output">轉換結果</label>
            <textarea id="base-output" readonly placeholder="轉換結果會顯示在這裡"></textarea>
          </div>
          <div class="actions">
            <button id="base-copy-btn" class="btn" type="button">複製輸出</button>
          </div>
        </section>

        <section class="panel">
          <h2>使用方式</h2>
          <p>1. 輸入數值並設定來源/目標進制。</p>
          <p>2. 點擊轉換。</p>
          <p>3. 查看目標結果與常用進制換算值。</p>
        </section>

        <section class="panel">
          <h2>常見問題</h2>
          <p><strong>支援小數嗎？</strong> 目前僅支援整數。</p>
          <p><strong>可用大數嗎？</strong> 可以，使用 BigInt 計算。</p>
        </section>

        <section class="panel">
          <h2>推薦工具</h2>
          <ul class="link-list" data-layout="recommended"></ul>
        </section>
      </article>
    </main>
    <div data-layout="footer"></div>

    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.26";
      import initBaseConverter from "/assets/js/tools/base_converter.js?v=1.6.26";

      initLayout();
      initBaseConverter();
    </script>
  </body>
</html>
