<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolNestTW 時區轉換器</title>
    <meta name="description" content="Convert datetime values between global timezones with UTC offset details." />
    <meta name="keywords" content="timezone converter,time zone,datetime conversion,utc offset" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div data-layout="header"></div>
    <main class="layout-shell">
      <article class="tool-page">
        <section class="hero">
          <h1>時區轉換器</h1>
          <p class="lead">在不同時區之間轉換日期時間，並顯示 UTC 偏移資訊。</p>
        </section>

        <section class="panel">
          <h2>輸入</h2>
          <div class="row">
            <div class="field">
              <label for="tz-datetime">日期時間</label>
              <input id="tz-datetime" type="datetime-local" />
            </div>
            <div class="field">
              <label for="tz-from">來源時區</label>
              <select id="tz-from"></select>
            </div>
          </div>
          <div class="field">
            <label for="tz-to">目標時區</label>
            <select id="tz-to"></select>
          </div>
        </section>

        <section class="panel">
          <h2>操作</h2>
          <div class="actions">
            <button id="tz-convert-btn" class="btn btn-primary" type="button">轉換時區</button>
            <button id="tz-swap-btn" class="btn" type="button">交換時區</button>
            <button id="tz-now-btn" class="btn" type="button">現在時間</button>
            <button id="tz-sample-btn" class="btn" type="button">載入範例</button>
            <button id="tz-clear-btn" class="btn btn-danger" type="button">清除</button>
          </div>
        </section>

        <section class="panel">
          <h2>輸出</h2>
          <div class="field">
            <label for="tz-output">轉換結果</label>
            <textarea id="tz-output" readonly placeholder="轉換結果會顯示在這裡"></textarea>
          </div>
          <div class="actions">
            <button id="tz-copy-btn" class="btn" type="button">複製輸出</button>
          </div>
        </section>

        <section class="panel">
          <h2>使用方式</h2>
          <p>1. 選擇來源與目標時區並輸入日期時間。</p>
          <p>2. 點擊轉換時區。</p>
          <p>3. 查看目標時間、UTC 偏移與 Unix 時間戳。</p>
        </section>

        <section class="panel">
          <h2>常見問題</h2>
          <p><strong>支援夏令時間嗎？</strong> 支援，依 IANA 時區資料自動套用。</p>
          <p><strong>資料會上傳嗎？</strong> 不會，全部在本機瀏覽器完成。</p>
        </section>

        <section class="panel">
          <h2>推薦工具</h2>
          <ul class="link-list" data-layout="recommended"></ul>
        </section>
      </article>
    </main>
    <div data-layout="footer"></div>

    <script type="module">
      import initLayout from "/assets/components/layout.js?v=1.6.26";
      import initTimezoneConverter from "/assets/js/tools/timezone_converter.js?v=1.6.26";

      initLayout();
      initTimezoneConverter();
    </script>
  </body>
</html>
